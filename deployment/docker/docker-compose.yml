services:
  # Backend server
  server:
    build:
      context: ../../server
      dockerfile: ../deployment/docker/Dockerfile.server
    container_name: skipbo-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - CORS_ORIGIN=https://${DOMAIN}
      - SKIPBO_DB_PATH=/app/data/skipbo.db
    volumes:
      - skipbo_data:/app/data
    expose:
      - '3001'
    networks:
      - skipbo-network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend client
  client:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.client
      args:
        # Empty REACT_APP_SERVER_URL means Socket.IO will connect to same origin
        # Caddy will proxy /socket.io/ requests to the backend
        - REACT_APP_SERVER_URL=
        - REACT_APP_COMMIT_HASH
    container_name: skipbo-client
    restart: unless-stopped
    expose:
      - '80'
    networks:
      - skipbo-network
    depends_on:
      - server
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Caddy reverse proxy with automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: skipbo-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - skipbo-network
    depends_on:
      - server
      - client

networks:
  skipbo-network:
    driver: bridge

volumes:
  skipbo_data:
  caddy_data:
  caddy_config:
